name: Docker Build And Push

on:
  push:
    branches:
      - main
  
jobs:
  build-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    
      - name: Build Backend image
        run: |
          docker build -t janvitikkiwal/realworld-example-backend-app ./backend/node-express-realworld-example-app/
        
      - name: Backend Image push
        run: |
          docker push janvitikkiwal/realworld-example-backend-app:latest

      - name: Build Frontend image 
        run: |
          docker build -t janvitikkiwal/realworld-example-frontend-app ./frontend/react-redux-realworld-example-app/
        
      - name: Frontend Image push
        run: |
          docker push janvitikkiwal/realworld-example-frontend-app:latest 

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          run: |
            cd ~/realworld
            docker compose pull
            docker compose up -d --remove-orphans
